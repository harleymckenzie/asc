name: Create Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
  pull_request:

jobs:
  create-release:
    name: "Create Release"
    runs-on: "ubuntu-latest"
    steps:
      - name: Create release
        uses: "marvinpinto/action-automatic-releases@latest"
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          prerelease: false
          automatic_release_tag: "v${{ github.ref }}"
          title: "Release v${{ github.ref }}"
