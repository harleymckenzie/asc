name: Create Release

on:
  push:
    tags:
    - '*'
  workflow_dispatch:

jobs:
  create-release:
    # Set release tag to the tag name
    name: "Create Release"
    runs-on: "ubuntu-latest"
    steps:
      - name: Create release
        uses: "marvinpinto/action-automatic-releases@latest"
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          prerelease: false
          automatic_release_tag: "${{ github.ref }}"
          title: "Release ${{ github.ref }}"
